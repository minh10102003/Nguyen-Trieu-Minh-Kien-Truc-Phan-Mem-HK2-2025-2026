server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/food_order
    username: postgres
    password: 123
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: always

services:
  payment:
    base-url: http://payment-service:8080
  kitchen:
    base-url: http://kitchen-service:8080
