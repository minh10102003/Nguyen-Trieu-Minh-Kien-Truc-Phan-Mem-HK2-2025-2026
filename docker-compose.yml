services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movie_booking_eda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Tránh trùng cổng với PostgreSQL cài sẵn trên máy (thường 5432)
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-full-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie_booking_eda"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092

  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: user-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movie_booking_eda
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  movie-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: movie-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movie_booking_eda
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  booking-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: booking-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movie_booking_eda
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  payment-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: payment-service
    depends_on:
      - kafka
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        MODULE: gateway
    depends_on:
      - user-service
      - movie-service
      - booking-service
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URI: http://user-service:8081
      MOVIE_SERVICE_URI: http://movie-service:8082
      BOOKING_SERVICE_URI: http://booking-service:8083

  frontend:
    build: ./frontend
    depends_on:
      - gateway
    ports:
      - "8085:8085"

volumes:
  pgdata:
